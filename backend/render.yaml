services:
  - type: web
    name: repolens-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
    disk:
      name: repolens-data
      mountPath: /opt/render/project/src/backend
      sizeGB: 1
